version: '3.8'

services:
  backend:
    build: ./backend
    container_name: equipment-backend
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: equipment-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
