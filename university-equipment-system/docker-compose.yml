version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: equipment-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: equipment-backend
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/university_equipment
      - JWT_SECRET=university_equipment_secret_key_2024
      - JWT_EXPIRES_IN=7d
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: equipment-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
